<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NVIDIA NIM · DeepSeek V3.2</title>
    <!-- Font & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #0A0A0A;
            color: #FFFFFF;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            font-weight: 500;
            -webkit-tap-highlight-color: transparent;
        }

        /* Header */
        .app-header {
            background: #0F0F0F;
            padding: 12px 16px;
            border-bottom: 1px solid rgba(255, 80, 0, 0.15);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.6);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .hamburger-btn {
            background: none;
            border: none;
            color: #FF5500;
            font-size: 24px;
            cursor: pointer;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            transition: background 0.2s;
        }

        .hamburger-btn:active {
            background: rgba(255, 80, 0, 0.1);
        }

        .header-title {
            display: flex;
            align-items: baseline;
            gap: 6px;
        }

        .header-title h1 {
            font-size: 20px;
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #FF5500, #FF8A00);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .model-badge {
            font-size: 12px;
            font-weight: 700;
            color: #FF5500;
            background: rgba(255, 80, 0, 0.1);
            padding: 2px 8px;
            border-radius: 30px;
            border: 1px solid rgba(255, 80, 0, 0.2);
        }

        .header-actions {
            display: flex;
            gap: 8px;
        }

        .icon-btn {
            background: none;
            border: none;
            color: #FF5500;
            font-size: 20px;
            cursor: pointer;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            transition: background 0.2s;
        }

        .icon-btn:active {
            background: rgba(255, 80, 0, 0.1);
        }

        /* Sidebar */
        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: 0.25s;
            backdrop-filter: blur(3px);
        }

        .sidebar-overlay.open {
            opacity: 1;
            visibility: visible;
        }

        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            width: 85%;
            max-width: 320px;
            background: #111111;
            z-index: 1001;
            transform: translateX(-100%);
            transition: transform 0.3s cubic-bezier(0.2,0.9,0.4,1);
            display: flex;
            flex-direction: column;
            box-shadow: 4px 0 20px rgba(0,0,0,0.8);
            border-right: 1px solid #222;
            overflow-y: auto;
        }

        .sidebar.open {
            transform: translateX(0);
        }

        .sidebar-header {
            padding: 20px 16px;
            border-bottom: 1px solid #222;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            background: #111;
            z-index: 2;
        }

        .sidebar-header h3 {
            font-weight: 700;
            font-size: 18px;
            color: #FF5500;
        }

        .sidebar-content {
            flex: 1;
            padding: 16px;
        }

        .config-section {
            margin-bottom: 28px;
        }

        .config-label {
            display: block;
            font-weight: 700;
            font-size: 14px;
            color: #FF8A00;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .config-input {
            width: 100%;
            background: #1A1A1A;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 12px 14px;
            color: white;
            font-weight: 500;
            font-size: 14px;
            margin-bottom: 12px;
            transition: border 0.2s;
        }

        .config-input:focus {
            outline: none;
            border-color: #FF5500;
        }

        .param-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .param-row label {
            font-weight: 600;
            font-size: 14px;
            color: #CCC;
        }

        .param-row input {
            width: 80px;
            background: #1A1A1A;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 8px 10px;
            color: white;
            font-weight: 600;
            text-align: right;
        }

        .new-chat-btn {
            background: #FF5500;
            color: black;
            border: none;
            font-weight: 700;
            padding: 12px 16px;
            border-radius: 30px;
            width: 100%;
            font-size: 16px;
            margin: 8px 0 20px;
            cursor: pointer;
            transition: 0.2s;
        }

        .history-item {
            background: #1A1A1A;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 8px;
            border-left: 3px solid #FF5500;
            cursor: pointer;
        }

        .history-title {
            font-weight: 700;
            font-size: 14px;
            margin-bottom: 4px;
            color: #FF8A00;
        }

        .history-preview {
            font-size: 12px;
            color: #AAA;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .clear-history-btn {
            background: none;
            border: 1px solid #FF5500;
            color: #FF5500;
            padding: 10px;
            border-radius: 20px;
            width: 100%;
            font-weight: 700;
            margin-top: 12px;
            cursor: pointer;
        }

        /* Chat Area */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px 12px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: #0A0A0A;
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 90%;
            animation: fadeIn 0.2s;
        }

        .message.user { align-self: flex-end; }
        .message.assistant { align-self: flex-start; }

        .message-content {
            padding: 14px 16px;
            border-radius: 22px;
            font-weight: 500;
            line-height: 1.5;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .user .message-content {
            background: #FF5500;
            color: black;
            border-bottom-right-radius: 6px;
            font-weight: 600;
        }

        .assistant .message-content {
            background: #1A1A1A;
            border: 1px solid #2A2A2A;
            border-bottom-left-radius: 6px;
            color: #EEE;
        }

        /* Thinking block collapsible */
        .think-block {
            margin: 8px 0;
            border: 1px solid #FF5500;
            border-radius: 12px;
            overflow: hidden;
            background: #111;
        }

        .think-header {
            padding: 10px 14px;
            background: #1A1A1A;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-weight: 700;
            color: #FF8A00;
            border-bottom: 1px solid transparent;
            transition: 0.2s;
        }

        .think-header i {
            transition: transform 0.2s;
        }

        .think-header.collapsed i {
            transform: rotate(-90deg);
        }

        .think-content {
            padding: 12px 14px;
            color: #BBB;
            font-size: 14px;
            border-top: 1px solid #333;
            white-space: pre-wrap;
            max-height: 300px;
            overflow-y: auto;
        }

        .think-content.collapsed {
            display: none;
        }

        /* Code blocks */
        .code-block-wrapper {
            position: relative;
            margin: 12px 0;
            border-radius: 12px;
            overflow: hidden;
            background: #0D0D0D;
            border: 1px solid #333;
        }

        .code-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            background: #1A1A1A;
            border-bottom: 1px solid #333;
            color: #AAA;
            font-size: 12px;
            font-weight: 600;
        }

        .copy-code-btn {
            background: none;
            border: 1px solid #FF5500;
            color: #FF5500;
            padding: 4px 10px;
            border-radius: 16px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: 0.2s;
        }

        .copy-code-btn.copied {
            background: #FF5500;
            color: black;
        }

        .code-block {
            padding: 14px;
            margin: 0;
            overflow-x: auto;
            font-family: 'SF Mono', 'Monaco', 'Inconsolata', 'Fira Code', monospace;
            font-size: 13px;
            line-height: 1.5;
            white-space: pre;
            color: #E0E0E0;
        }

        /* File attachment & download */
        .file-attachment {
            margin-top: 8px;
            background: #1A1A1A;
            padding: 8px 12px;
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            border: 1px dashed #FF5500;
            color: #FF8A00;
        }

        .generated-file-link {
            background: #1A1A1A;
            border-radius: 16px;
            padding: 12px;
            margin-top: 12px;
            border: 1px solid #FF5500;
            display: inline-block;
        }

        .download-link {
            color: #FF8A00;
            font-weight: 700;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        /* Input Area - redesigned */
        .input-area {
            background: #0F0F0F;
            border-top: 1px solid #222;
            padding: 12px 16px;
            flex-shrink: 0;
        }

        .file-preview-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 10px;
        }

        .file-preview {
            background: #1A1A1A;
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
            color: #FF8A00;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border: 1px solid #333;
        }

        .input-row {
            display: flex;
            align-items: flex-end;
            gap: 8px;
        }

        .message-input {
            flex: 1;
            background: #1A1A1A;
            border: 1.5px solid #2A2A2A;
            border-radius: 28px;
            padding: 14px 18px;
            color: white;
            font-weight: 500;
            font-size: 15px;
            max-height: 120px;
            resize: none;
            font-family: inherit;
            line-height: 1.4;
        }

        .message-input:focus {
            outline: none;
            border-color: #FF5500;
        }

        .action-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
        }

        .mode-buttons {
            display: flex;
            gap: 8px;
        }

        .mode-btn {
            background: #1A1A1A;
            border: 1px solid #2A2A2A;
            color: #CCC;
            font-weight: 700;
            padding: 8px 12px;
            border-radius: 30px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: 0.2s;
            white-space: nowrap;
        }

        .mode-btn i {
            font-size: 14px;
        }

        .mode-btn.active {
            background: #FF5500;
            color: black;
            border-color: #FF5500;
        }

        .send-btn {
            background: #FF5500;
            border: none;
            color: black;
            font-weight: 800;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(255,80,0,0.3);
        }

        .send-btn:disabled {
            opacity: 0.5;
            pointer-events: none;
        }

        /* Loading */
        .typing-indicator {
            display: flex;
            gap: 6px;
            padding: 16px;
            background: #1A1A1A;
            border-radius: 22px;
            width: fit-content;
        }

        .typing-dot {
            width: 10px;
            height: 10px;
            background: #FF5500;
            border-radius: 50%;
            animation: bounce 1.4s infinite;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }

        @media (min-width: 768px) {
            .app-header { padding: 12px 24px; }
            .chat-container { padding: 20px 24px; }
            .input-area { padding: 16px 24px; }
        }
    </style>
</head>
<body>

<!-- SIDEBAR (sama seperti sebelumnya) -->
<div class="sidebar-overlay" id="sidebarOverlay"></div>
<aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <h3>KONFIGURASI</h3>
        <button class="icon-btn" id="closeSidebarBtn" style="color:#FF5500;"><i class="fas fa-times"></i></button>
    </div>
    <div class="sidebar-content">
        <div class="config-section">
            <label class="config-label">MODEL ID</label>
            <input type="text" class="config-input" id="modelIdInput" value="deepseek-ai/deepseek-v3.2">
        </div>
        <div class="config-section">
            <label class="config-label">PARAMETER</label>
            <div class="param-row">
                <label>Temperature</label>
                <input type="number" id="temperatureInput" min="0" max="2" step="0.1" value="1.0">
            </div>
            <div class="param-row">
                <label>Top P</label>
                <input type="number" id="topPInput" min="0" max="1" step="0.05" value="0.95">
            </div>
            <div class="param-row">
                <label>Max Tokens</label>
                <input type="number" id="maxTokensInput" min="1" max="8192" value="8192">
            </div>
        </div>
        <div class="config-section">
            <label class="config-label">PERSONALISASI</label>
            <input type="text" class="config-input" id="systemPromptInput" placeholder="System prompt (opsional)" value="">
        </div>
        <button class="new-chat-btn" id="newChatSidebarBtn"><i class="fas fa-plus-circle"></i> NEW CHAT</button>
        <div class="config-section">
            <label class="config-label">RIWAYAT CHAT</label>
            <div id="historyList"></div>
            <button class="clear-history-btn" id="clearHistoryBtn"><i class="fas fa-trash-alt"></i> HAPUS SEMUA</button>
        </div>
        <div class="sidebar-note" style="color:#AAA;font-size:12px;margin-top:12px;">
            <i class="fas fa-shield-alt"></i> API Key via server
        </div>
    </div>
</aside>

<!-- HEADER -->
<header class="app-header">
    <div class="header-left">
        <button class="hamburger-btn" id="hamburgerBtn"><i class="fas fa-bars"></i></button>
        <div class="header-title">
            <h1>NVIDIA NIM</h1>
            <span class="model-badge" id="headerModelBadge">deepseek-v3.2</span>
        </div>
    </div>
    <div class="header-actions">
        <button class="icon-btn" id="newChatHeaderBtn"><i class="fas fa-plus"></i></button>
    </div>
</header>

<!-- CHAT DISPLAY -->
<div class="chat-container" id="chatContainer"></div>

<!-- INPUT AREA (redesigned) -->
<div class="input-area">
    <div class="file-preview-container" id="filePreviewContainer"></div>
    <div class="input-row">
        <textarea class="message-input" id="messageInput" placeholder="Ketik pesan..." rows="1"></textarea>
    </div>
    <div class="action-row">
        <div class="mode-buttons">
            <button class="mode-btn" id="thinkingModeBtn"><i class="fas fa-brain"></i><span>THINKING</span></button>
            <button class="mode-btn" id="toolsModeBtn"><i class="fas fa-tools"></i><span>TOOLS</span></button>
            <button class="mode-btn" id="uploadFileBtn"><i class="fas fa-paperclip"></i></button>
            <input type="file" id="fileInput" multiple style="display:none;" accept="*/*">
        </div>
        <button class="send-btn" id="sendBtn"><span>KIRIM</span> <i class="fas fa-paper-plane"></i></button>
    </div>
</div>

<script>
    (function(){
        'use strict';

        // ---------- STATE ----------
        let modelId = localStorage.getItem('model_id') || 'deepseek-ai/deepseek-v3.2';
        let temperature = parseFloat(localStorage.getItem('temp') || '1.0');
        let topP = parseFloat(localStorage.getItem('top_p') || '0.95');
        let maxTokens = parseInt(localStorage.getItem('max_tokens') || '8192');
        let systemPrompt = localStorage.getItem('system_prompt') || '';

        let messages = [];
        let chatHistory = [];
        let currentFiles = [];
        let thinkingMode = false;
        let toolsMode = false;
        let isLoading = false;

        // DOM Elements
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebarOverlay');
        const chatContainer = document.getElementById('chatContainer');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const thinkingModeBtn = document.getElementById('thinkingModeBtn');
        const toolsModeBtn = document.getElementById('toolsModeBtn');
        const uploadFileBtn = document.getElementById('uploadFileBtn');
        const fileInput = document.getElementById('fileInput');
        const filePreviewContainer = document.getElementById('filePreviewContainer');
        const modelIdInput = document.getElementById('modelIdInput');
        const temperatureInput = document.getElementById('temperatureInput');
        const topPInput = document.getElementById('topPInput');
        const maxTokensInput = document.getElementById('maxTokensInput');
        const systemPromptInput = document.getElementById('systemPromptInput');
        const historyList = document.getElementById('historyList');
        const headerModelBadge = document.getElementById('headerModelBadge');

        // ---------- INIT ----------
        function init() {
            modelIdInput.value = modelId;
            temperatureInput.value = temperature;
            topPInput.value = topP;
            maxTokensInput.value = maxTokens;
            systemPromptInput.value = systemPrompt;
            updateHeaderBadge();

            loadChatHistory();
            loadMessagesFromStorage();
            if (messages.length === 0) addWelcomeMessage();
            else renderAllMessages();

            messageInput.addEventListener('input', autoResizeTextarea);
        }

        function addWelcomeMessage() {
            messages.push({ role: 'assistant', content: 'Halo! Saya asisten AI. Gunakan mode Tools untuk menghasilkan file.', timestamp: Date.now() });
            renderAllMessages();
        }

        function updateHeaderBadge() {
            headerModelBadge.textContent = modelId.split('/').pop() || 'deepseek-v3.2';
        }

        // ---------- RENDER (dengan parsing think & code) ----------
        function renderAllMessages() {
            chatContainer.innerHTML = '';
            messages.forEach(msg => appendMessageToDOM(msg));
            scrollToBottom();
        }

        function appendMessageToDOM(msg) {
            const div = document.createElement('div');
            div.className = `message ${msg.role}`;

            let contentHtml = '';
            if (msg.role === 'assistant') {
                // Parsing konten: ekstrak reasoning dan format code blocks
                const { cleanedContent, reasoning } = extractThinking(msg.content || '');
                const formattedContent = formatContentWithCodeBlocks(cleanedContent);
                
                if (reasoning) {
                    contentHtml += createCollapsibleThinkBlock(reasoning);
                }
                contentHtml += `<div class="message-content">${formattedContent}</div>`;
            } else {
                contentHtml += `<div class="message-content">${escapeHtml(msg.content || '')}</div>`;
            }

            // Tools calls (file generation)
            if (msg.tool_calls && msg.tool_calls.length) {
                msg.tool_calls.forEach(tc => {
                    const args = tc.function?.arguments;
                    let fileData = {};
                    try { fileData = JSON.parse(args || '{}'); } catch(e){}
                    if (fileData.filename && fileData.content) {
                        contentHtml += `<div class="generated-file-link"><i class="fas fa-file-code"></i> <span class="download-link" data-filename="${escapeHtml(fileData.filename)}" data-content="${escapeHtml(fileData.content)}">📄 ${escapeHtml(fileData.filename)} · Download</span></div>`;
                    }
                });
            }

            if (msg.file) {
                contentHtml += `<div class="file-attachment"><i class="fas fa-paperclip"></i> ${escapeHtml(msg.file.name)}</div>`;
            }

            const timeStr = msg.timestamp ? new Date(msg.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : '';
            div.innerHTML = contentHtml + `<div class="message-meta">${msg.role === 'user' ? 'Anda' : 'NVIDIA NIM'} · ${timeStr}</div>`;
            chatContainer.appendChild(div);

            // Attach event: collapsible think
            div.querySelectorAll('.think-header').forEach(h => {
                h.addEventListener('click', () => {
                    const content = h.nextElementSibling;
                    h.classList.toggle('collapsed');
                    content.classList.toggle('collapsed');
                });
            });

            // Attach copy code
            div.querySelectorAll('.copy-code-btn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const wrapper = e.target.closest('.code-block-wrapper');
                    const code = wrapper.querySelector('.code-block').textContent;
                    try {
                        await navigator.clipboard.writeText(code);
                        btn.classList.add('copied');
                        btn.innerHTML = '<i class="fas fa-check"></i> Copied';
                        setTimeout(() => {
                            btn.classList.remove('copied');
                            btn.innerHTML = '<i class="far fa-copy"></i> Copy';
                        }, 2000);
                    } catch(err) {
                        alert('Gagal menyalin');
                    }
                });
            });

            // Attach download
            div.querySelectorAll('.download-link').forEach(el => {
                el.addEventListener('click', (e) => {
                    const filename = el.dataset.filename || 'generated.txt';
                    const content = el.dataset.content || '';
                    downloadTextFile(filename, content);
                });
            });
        }

        function extractThinking(text) {
            const thinkRegex = /<think>([\s\S]*?)<\/think>/i;
            const match = text.match(thinkRegex);
            if (match) {
                const reasoning = match[1].trim();
                const cleaned = text.replace(thinkRegex, '').trim();
                return { cleanedContent: cleaned, reasoning };
            }
            return { cleanedContent: text, reasoning: '' };
        }

        function createCollapsibleThinkBlock(reasoning) {
            return `
                <div class="think-block">
                    <div class="think-header">
                        <i class="fas fa-chevron-down"></i>
                        <i class="fas fa-brain"></i> THINKING
                    </div>
                    <div class="think-content">${escapeHtml(reasoning)}</div>
                </div>
            `;
        }

        function formatContentWithCodeBlocks(text) {
            // Deteksi blok kode dengan ```
            const codeBlockRegex = /```(\w*)\n([\s\S]*?)```/g;
            let lastIndex = 0;
            let parts = [];
            let match;
            while ((match = codeBlockRegex.exec(text)) !== null) {
                const before = text.substring(lastIndex, match.index);
                if (before) parts.push(escapeHtml(before));
                const lang = match[1] || 'text';
                const code = match[2];
                parts.push(`
                    <div class="code-block-wrapper">
                        <div class="code-header">
                            <span>${escapeHtml(lang)}</span>
                            <button class="copy-code-btn"><i class="far fa-copy"></i> Copy</button>
                        </div>
                        <pre class="code-block">${escapeHtml(code)}</pre>
                    </div>
                `);
                lastIndex = match.index + match[0].length;
            }
            const remaining = text.substring(lastIndex);
            if (remaining) parts.push(escapeHtml(remaining));
            return parts.join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function downloadTextFile(filename, content) {
            const blob = new Blob([content], {type: 'text/plain'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
            URL.revokeObjectURL(url);
        }

        function scrollToBottom() { chatContainer.scrollTop = chatContainer.scrollHeight; }
        function autoResizeTextarea() {
            messageInput.style.height = 'auto';
            messageInput.style.height = Math.min(messageInput.scrollHeight, 120) + 'px';
        }

        // ---------- FILE ----------
        function handleFiles(files) {
            currentFiles = Array.from(files);
            renderFilePreviews();
        }
        function renderFilePreviews() {
            filePreviewContainer.innerHTML = '';
            currentFiles.forEach((f,i) => {
                const div = document.createElement('div');
                div.className = 'file-preview';
                div.innerHTML = `<i class="fas fa-file"></i> ${escapeHtml(f.name)} <button class="remove-file" data-index="${i}">✕</button>`;
                filePreviewContainer.appendChild(div);
            });
            document.querySelectorAll('.remove-file').forEach(b => {
                b.addEventListener('click', (e) => {
                    currentFiles.splice(e.target.dataset.index,1);
                    renderFilePreviews();
                });
            });
        }
        function clearFiles() { currentFiles = []; filePreviewContainer.innerHTML = ''; fileInput.value = ''; }

        // ---------- HISTORY ----------
        function loadChatHistory() {
            const stored = localStorage.getItem('chat_history');
            chatHistory = stored ? JSON.parse(stored) : [];
            renderHistoryList();
        }
        function renderHistoryList() {
            historyList.innerHTML = '';
            if (!chatHistory.length) {
                historyList.innerHTML = '<div style="color:#777;padding:8px;">Belum ada riwayat</div>';
                return;
            }
            [...chatHistory].reverse().forEach(item => {
                const div = document.createElement('div');
                div.className = 'history-item';
                div.innerHTML = `<div class="history-title">${escapeHtml(item.title||'')}</div><div class="history-preview">${escapeHtml(item.preview||'')}</div>`;
                div.addEventListener('click', ()=> alert('Load chat dari history (coming soon)'));
                historyList.appendChild(div);
            });
        }
        function addToChatHistory(userMsg, assistantMsg) {
            const id = Date.now();
            chatHistory.push({ id, title: userMsg.substring(0,30), preview: assistantMsg.substring(0,40) });
            if (chatHistory.length > 30) chatHistory.shift();
            localStorage.setItem('chat_history', JSON.stringify(chatHistory));
            renderHistoryList();
        }
        function clearAllHistory() {
            chatHistory = [];
            localStorage.removeItem('chat_history');
            renderHistoryList();
        }
        function saveCurrentSession() { localStorage.setItem('current_messages', JSON.stringify(messages)); }
        function loadMessagesFromStorage() {
            const stored = localStorage.getItem('current_messages');
            if (stored) try { messages = JSON.parse(stored); } catch(e){}
        }
        function newChat() {
            messages = [];
            addWelcomeMessage();
            saveCurrentSession();
            clearFiles();
        }

        // ---------- SYNC ----------
        function syncConfigToStorage() {
            localStorage.setItem('model_id', modelId);
            localStorage.setItem('temp', temperature);
            localStorage.setItem('top_p', topP);
            localStorage.setItem('max_tokens', maxTokens);
            localStorage.setItem('system_prompt', systemPrompt);
            updateHeaderBadge();
        }

        // ---------- API CALL ----------
        async function sendMessage() {
            const userText = messageInput.value.trim();
            if (!userText && currentFiles.length === 0) return;
            if (isLoading) return;

            let userContent = userText;
            if (currentFiles.length) userContent += `\n[File: ${currentFiles.map(f=>f.name).join(', ')}]`;

            const userMsg = { role: 'user', content: userContent, timestamp: Date.now(), file: currentFiles[0] };
            messages.push(userMsg);
            appendMessageToDOM(userMsg);
            messageInput.value = '';
            autoResizeTextarea();
            clearFiles();

            const assistantPlaceholder = { role: 'assistant', content: '', timestamp: Date.now(), tool_calls: [] };
            messages.push(assistantPlaceholder);
            const assistantMsgDiv = document.createElement('div');
            assistantMsgDiv.className = 'message assistant';
            assistantMsgDiv.innerHTML = `<div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
            chatContainer.appendChild(assistantMsgDiv);
            scrollToBottom();

            isLoading = true;
            sendBtn.disabled = true;

            try {
                const apiMessages = systemPrompt ? [{ role: 'system', content: systemPrompt }] : [];
                for (let i=0; i<messages.length-1; i++) apiMessages.push({ role: messages[i].role, content: messages[i].content });

                const requestBody = {
                    model: modelId,
                    messages: apiMessages,
                    temperature, top_p: topP, max_tokens: maxTokens,
                    stream: true,
                    chat_template_kwargs: { thinking: thinkingMode }
                };
                if (toolsMode) {
                    requestBody.tools = [
                        { type: "function", function: { name: "generate_text_file", description: "Generate a text file", parameters: { type: "object", properties: { filename: {type:"string"}, content: {type:"string"} }, required: ["filename","content"] } } }
                    ];
                    requestBody.tool_choice = "auto";
                }

                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {'Content-Type':'application/json'},
                    body: JSON.stringify(requestBody)
                });

                if (!response.ok) {
                    let err = await response.text();
                    throw new Error(err.substring(0,100));
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let fullContent = '';
                let toolCalls = [];

                assistantMsgDiv.innerHTML = '';
                const contentDiv = document.createElement('div');
                contentDiv.className = 'message-content';
                assistantMsgDiv.appendChild(contentDiv);

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n').filter(l=>l.trim());
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const data = line.slice(6);
                            if (data === '[DONE]') continue;
                            try {
                                const json = JSON.parse(data);
                                const delta = json.choices[0]?.delta;
                                if (delta?.content) fullContent += delta.content;
                                if (delta?.tool_calls) toolCalls = delta.tool_calls;

                                // Render live (parsing sederhana)
                                const { cleanedContent, reasoning } = extractThinking(fullContent);
                                let html = reasoning ? createCollapsibleThinkBlock(reasoning) : '';
                                html += formatContentWithCodeBlocks(cleanedContent);
                                if (toolCalls.length) {
                                    toolCalls.forEach(tc => {
                                        const args = tc.function?.arguments;
                                        let file = {};
                                        try { file = JSON.parse(args || '{}'); } catch(e){}
                                        if (file.filename && file.content) {
                                            html += `<div class="generated-file-link"><i class="fas fa-file-code"></i> <span class="download-link" data-filename="${escapeHtml(file.filename)}" data-content="${escapeHtml(file.content)}">📄 ${escapeHtml(file.filename)} · Download</span></div>`;
                                        }
                                    });
                                }
                                contentDiv.innerHTML = html;
                                // Re-attach listeners untuk think & copy dalam streaming (bisa menggunakan event delegation nanti)
                                scrollToBottom();
                            } catch(e){}
                        }
                    }
                }

                messages[messages.length-1] = { role: 'assistant', content: fullContent, tool_calls: toolCalls, timestamp: Date.now() };
                assistantMsgDiv.innerHTML += `<div class="message-meta">NVIDIA NIM · ${new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>`;
                // Re-attach events
                assistantMsgDiv.querySelectorAll('.think-header').forEach(h => {
                    h.addEventListener('click', () => {
                        const content = h.nextElementSibling;
                        h.classList.toggle('collapsed');
                        content.classList.toggle('collapsed');
                    });
                });
                assistantMsgDiv.querySelectorAll('.copy-code-btn').forEach(btn => {
                    btn.addEventListener('click', async (e) => {
                        const wrapper = e.target.closest('.code-block-wrapper');
                        const code = wrapper.querySelector('.code-block').textContent;
                        await navigator.clipboard.writeText(code);
                        btn.classList.add('copied');
                        btn.innerHTML = '<i class="fas fa-check"></i> Copied';
                        setTimeout(() => {
                            btn.classList.remove('copied');
                            btn.innerHTML = '<i class="far fa-copy"></i> Copy';
                        }, 2000);
                    });
                });
                assistantMsgDiv.querySelectorAll('.download-link').forEach(el => {
                    el.addEventListener('click', () => downloadTextFile(el.dataset.filename, el.dataset.content));
                });

                saveCurrentSession();
                addToChatHistory(userText, fullContent);
            } catch (error) {
                assistantMsgDiv.innerHTML = `<div class="message-content" style="color:#FF5500;">Error: ${escapeHtml(error.message)}</div>`;
                messages.pop();
            } finally {
                isLoading = false;
                sendBtn.disabled = false;
            }
        }

        // ---------- EVENT LISTENERS ----------
        document.getElementById('hamburgerBtn').addEventListener('click', ()=> { sidebar.classList.add('open'); overlay.classList.add('open'); });
        document.getElementById('closeSidebarBtn').addEventListener('click', ()=> { sidebar.classList.remove('open'); overlay.classList.remove('open'); });
        overlay.addEventListener('click', ()=> { sidebar.classList.remove('open'); overlay.classList.remove('open'); });
        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keydown', (e) => { if (e.key==='Enter'&&!e.shiftKey) { e.preventDefault(); sendMessage(); } });
        thinkingModeBtn.addEventListener('click', ()=> { thinkingMode = !thinkingMode; thinkingModeBtn.classList.toggle('active', thinkingMode); });
        toolsModeBtn.addEventListener('click', ()=> { toolsMode = !toolsMode; toolsModeBtn.classList.toggle('active', toolsMode); });
        uploadFileBtn.addEventListener('click', ()=> fileInput.click());
        fileInput.addEventListener('change', (e)=> handleFiles(e.target.files));
        modelIdInput.addEventListener('input', (e)=> { modelId = e.target.value; syncConfigToStorage(); });
        temperatureInput.addEventListener('input', (e)=> { temperature = parseFloat(e.target.value); syncConfigToStorage(); });
        topPInput.addEventListener('input', (e)=> { topP = parseFloat(e.target.value); syncConfigToStorage(); });
        maxTokensInput.addEventListener('input', (e)=> { maxTokens = parseInt(e.target.value); syncConfigToStorage(); });
        systemPromptInput.addEventListener('input', (e)=> { systemPrompt = e.target.value; syncConfigToStorage(); });
        document.getElementById('newChatSidebarBtn').addEventListener('click', ()=> { newChat(); sidebar.classList.remove('open'); overlay.classList.remove('open'); });
        document.getElementById('newChatHeaderBtn').addEventListener('click', newChat);
        document.getElementById('clearHistoryBtn').addEventListener('click', clearAllHistory);

        init();
    })();
</script>
</body>
</html>
